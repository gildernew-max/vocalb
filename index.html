<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🇪🇸 Madrigal's Magic Spanish Flashcards</title>
  <style>
    :root {
      --primary: #e63946;
      --secondary: #f4a261;
      --accent: #2a9d8f;
      --bg: #f8f4ef;
      --card-front: #ffffff;
      --card-back: #264653;
      --text-dark: #1d3557;
      --text-light: #f1faee;
      --shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background: linear-gradient(135deg, var(--primary) 0%, #c1121f 100%);
      color: white;
      text-align: center;
      padding: 24px 16px 20px;
      box-shadow: 0 4px 20px rgba(198,18,31,.35);
    }
    header h1 { font-size: clamp(1.4rem, 4vw, 2rem); letter-spacing: .5px; }
    header p  { margin-top: 4px; opacity: .85; font-size: .95rem; }

    /* ── Deck filter tabs ── */
    #deck-bar {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
      padding: 18px 16px 10px;
      width: 100%; max-width: 860px;
    }
    .deck-btn {
      background: white; border: 2px solid #ddd; border-radius: 20px;
      padding: 6px 16px; cursor: pointer; font-size: .85rem; transition: all .2s;
      color: var(--text-dark);
    }
    .deck-btn:hover { border-color: var(--primary); color: var(--primary); }
    .deck-btn.active {
      background: var(--primary); color: white; border-color: var(--primary);
    }

    /* ── Stats bar ── */
    #stats {
      display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
      padding: 8px 16px 16px;
      font-size: .9rem; color: #555;
    }
    #stats span { display: flex; align-items: center; gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .dot-new    { background: #90a4ae; }
    .dot-right  { background: var(--accent); }
    .dot-wrong  { background: var(--primary); }

    /* ── Card area ── */
    #card-area {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px 16px 20px;
      width: 100%; max-width: 600px;
    }

    .card-wrapper {
      perspective: 1200px;
      width: 100%; max-width: 500px;
      height: 280px;
      cursor: pointer;
      margin-bottom: 24px;
    }

    .card {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.4,0,.2,1);
      border-radius: 20px;
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0;
      border-radius: 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      backface-visibility: hidden;
      padding: 28px 32px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .card-front {
      background: var(--card-front);
      color: var(--text-dark);
    }
    .card-front .lang-label {
      position: absolute; top: 14px; left: 18px;
      font-size: .72rem; font-weight: 700; letter-spacing: 1.5px;
      color: var(--primary); text-transform: uppercase;
    }
    .card-front .hint {
      position: absolute; bottom: 14px;
      font-size: .75rem; color: #aaa;
    }
    .card-front .category-tag {
      position: absolute; top: 14px; right: 18px;
      font-size: .7rem; background: #f0f0f0; border-radius: 10px;
      padding: 3px 10px; color: #888;
    }
    .card-front .spanish-word {
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      font-weight: 700; line-height: 1.2;
      color: var(--text-dark);
    }

    .card-back {
      background: var(--card-back);
      color: var(--text-light);
      transform: rotateY(180deg);
    }
    .card-back .lang-label {
      position: absolute; top: 14px; left: 18px;
      font-size: .72rem; font-weight: 700; letter-spacing: 1.5px;
      color: var(--secondary); text-transform: uppercase;
    }
    .card-back .english-word {
      font-size: clamp(1.5rem, 5.5vw, 2.2rem);
      font-weight: 700; line-height: 1.2;
    }
    .card-back .memory-tip {
      margin-top: 12px; font-size: .85rem; opacity: .75; max-width: 340px;
    }

    /* ── Buttons ── */
    #btn-row {
      display: flex; gap: 12px; margin-top: 6px; flex-wrap: wrap; justify-content: center;
    }
    .btn {
      padding: 12px 28px; border: none; border-radius: 50px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      display: flex; align-items: center; gap: 7px;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.18); }
    .btn:active { transform: translateY(0); }

    .btn-wrong  { background: #fce4e4; color: var(--primary); }
    .btn-right  { background: #d8f3ef; color: var(--accent); }
    .btn-skip   { background: #e8eaf6; color: #5c6bc0; }
    .btn-flip   {
      background: linear-gradient(135deg,var(--primary),var(--secondary));
      color: white; padding: 14px 40px; font-size: 1.05rem;
    }

    /* ── Progress bar ── */
    #progress-wrap {
      width: 100%; max-width: 500px; height: 8px; background: #e0e0e0;
      border-radius: 4px; overflow: hidden; margin-bottom: 14px;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #52b788);
      border-radius: 4px;
      transition: width .4s ease;
    }

    /* ── Counter ── */
    #counter {
      font-size: .9rem; color: #777; margin-bottom: 10px;
    }

    /* ── Celebration overlay ── */
    #celebrate {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.55); z-index: 100;
      flex-direction: column; align-items: center; justify-content: center;
      color: white; text-align: center; padding: 24px;
    }
    #celebrate.show { display: flex; }
    #celebrate h2 { font-size: 2.5rem; margin-bottom: 12px; }
    #celebrate p  { font-size: 1.1rem; opacity: .85; margin-bottom: 28px; }
    #celebrate .score-box {
      background: rgba(255,255,255,.15); border-radius: 16px;
      padding: 20px 40px; margin-bottom: 28px;
      font-size: 1.3rem;
    }
    #celebrate .score-box span { font-size: 3rem; font-weight: 800; display: block; }
    .btn-restart {
      background: white; color: var(--primary);
      padding: 14px 40px; border-radius: 50px;
      border: none; font-size: 1.1rem; font-weight: 700;
      cursor: pointer; transition: transform .15s;
    }
    .btn-restart:hover { transform: scale(1.04); }

    /* ── Confetti canvas ── */
    #confetti-canvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 99;
    }

    /* ── Keyboard hint ── */
    #keyboard-hint {
      margin-top: 14px; font-size: .78rem; color: #aaa; text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card-wrapper { height: 240px; }
      .btn { padding: 10px 20px; font-size: .9rem; }
      .btn-flip { padding: 12px 30px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🇪🇸 Madrigal's Magic Spanish Flashcards</h1>
  <p>Based on <em>Madrigal's Magic Key to Spanish</em> by Margarita Madrigal</p>
</header>

<!-- Deck selector -->
<div id="deck-bar">
  <button class="deck-btn active" data-deck="all">🃏 All Cards</button>
  <button class="deck-btn" data-deck="nouns">🏷 Nouns</button>
  <button class="deck-btn" data-deck="verbs">⚡ Verbs</button>
  <button class="deck-btn" data-deck="adjectives">🌈 Adjectives</button>
  <button class="deck-btn" data-deck="phrases">💬 Phrases</button>
  <button class="deck-btn" data-deck="rules">✨ Magic Rules</button>
</div>

<!-- Stats -->
<div id="stats">
  <span><span class="dot dot-new"></span> <span id="stat-new">0</span> new</span>
  <span><span class="dot dot-right"></span> <span id="stat-right">0</span> correct</span>
  <span><span class="dot dot-wrong"></span> <span id="stat-wrong">0</span> missed</span>
</div>

<!-- Card area -->
<div id="card-area">
  <div id="progress-wrap"><div id="progress-bar" style="width:0%"></div></div>
  <div id="counter">Card 1 of 0</div>

  <div class="card-wrapper" id="card-wrapper" onclick="flipCard()">
    <div class="card" id="card">
      <div class="card-face card-front">
        <span class="lang-label">🇪🇸 Spanish</span>
        <span class="category-tag" id="category-tag">noun</span>
        <div class="spanish-word" id="spanish-word">Loading…</div>
        <span class="hint">tap to reveal</span>
      </div>
      <div class="card-face card-back">
        <span class="lang-label">🇺🇸 English</span>
        <div class="english-word" id="english-word"></div>
        <div class="memory-tip" id="memory-tip"></div>
      </div>
    </div>
  </div>

  <div id="btn-row">
    <button class="btn btn-flip" onclick="flipCard()">👀 Reveal</button>
  </div>
  <div id="keyboard-hint">Space / ← → arrow keys • R = correct • W = missed</div>
</div>

<!-- Celebration overlay -->
<div id="celebrate">
  <canvas id="confetti-canvas"></canvas>
  <h2>🎉 ¡Excelente!</h2>
  <p>You've finished this deck!</p>
  <div class="score-box">
    <span id="final-score">0%</span>
    Final Score
  </div>
  <button class="btn-restart" onclick="restart()">🔄 Play Again</button>
</div>

// ─────────────────────────────────────────
// APP STATE
// ─────────────────────────────────────────
let deck = 'all';
let queue = [];
let currentIndex = 0;
let isFlipped = false;
let stats = { right: 0, wrong: 0 };
let cardStates = {}; // id -> 'right'|'wrong'|'new'

function getFilteredDeck() {
  if (deck === 'all') return [...ALL_CARDS];
  return ALL_CARDS.filter(c => c.deck === deck);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function init() {
  queue = shuffle(getFilteredDeck()).map((c, i) => ({ ...c, id: i }));
  currentIndex = 0;
  isFlipped = false;
  stats = { right: 0, wrong: 0 };
  cardStates = {};
  updateStats();
  showCard();
}

function showCard() {
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  isFlipped = false;

  if (currentIndex >= queue.length) {
    showCelebration();
    return;
  }

  const item = queue[currentIndex];
  document.getElementById('spanish-word').textContent = item.spanish;
  document.getElementById('english-word').textContent = item.english;
  document.getElementById('memory-tip').textContent = item.tip ? '💡 ' + item.tip : '';
  document.getElementById('category-tag').textContent = item.deck;

  const total = queue.length;
  const pct = (currentIndex / total) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('counter').textContent = `Card ${currentIndex + 1} of ${total}`;

  // Show flip button only before reveal
  setButtons(false);
}

function setButtons(revealed) {
  const row = document.getElementById('btn-row');
  if (revealed) {
    row.innerHTML = `
      <button class="btn btn-wrong" onclick="markCard(false)">✗ Missed</button>
      <button class="btn btn-skip"  onclick="skipCard()">→ Skip</button>
      <button class="btn btn-right" onclick="markCard(true)">✓ Got it!</button>
    `;
  } else {
    row.innerHTML = `<button class="btn btn-flip" onclick="flipCard()">👀 Reveal Answer</button>`;
  }
}

function flipCard() {
  const card = document.getElementById('card');
  isFlipped = !isFlipped;
  card.classList.toggle('flipped', isFlipped);
  if (isFlipped) setButtons(true);
  else setButtons(false);
}

function markCard(correct) {
  if (correct) {
    stats.right++;
    cardStates[currentIndex] = 'right';
  } else {
    stats.wrong++;
    cardStates[currentIndex] = 'wrong';
    // Put missed card back later
    const missed = { ...queue[currentIndex] };
    const insertAt = Math.min(currentIndex + 3, queue.length);
    queue.splice(insertAt, 0, missed);
  }
  updateStats();
  currentIndex++;
  showCard();
}

function skipCard() {
  currentIndex++;
  showCard();
}

function updateStats() {
  const total = queue.length;
  const answered = stats.right + stats.wrong;
  const newCount = total - answered;
  document.getElementById('stat-new').textContent   = Math.max(0, newCount);
  document.getElementById('stat-right').textContent = stats.right;
  document.getElementById('stat-wrong').textContent = stats.wrong;
}

function showCelebration() {
  const answered = stats.right + stats.wrong;
  const pct = answered > 0 ? Math.round((stats.right / answered) * 100) : 0;
  document.getElementById('final-score').textContent = pct + '%';
  document.getElementById('celebrate').classList.add('show');
  launchConfetti();
}

function restart() {
  document.getElementById('celebrate').classList.remove('show');
  stopConfetti();
  init();
}

// ── Deck buttons ──
document.querySelectorAll('.deck-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.deck-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    deck = btn.dataset.deck;
    init();
  });
});

// ── Keyboard controls ──
document.addEventListener('keydown', e => {
  if (document.getElementById('celebrate').classList.contains('show')) {
    if (e.key === 'Enter') restart();
    return;
  }
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault(); flipCard();
  } else if (e.key === 'ArrowRight' && isFlipped) markCard(true);
  else if (e.key === 'ArrowLeft'  && isFlipped) markCard(false);
  else if ((e.key === 'r' || e.key === 'R') && isFlipped) markCard(true);
  else if ((e.key === 'w' || e.key === 'W') && isFlipped) markCard(false);
});

// ─────────────────────────────────────────
// CONFETTI  (lightweight vanilla JS)
// ─────────────────────────────────────────
let confettiAnim = null;
const COLORS = ['#e63946','#f4a261','#2a9d8f','#e9c46a','#264653','#a8dadc'];

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const pieces = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    w: 8 + Math.random() * 10,
    h: 4 + Math.random() * 6,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    speed: 2 + Math.random() * 4,
    angle: Math.random() * Math.PI * 2,
    spin:  (Math.random() - .5) * .2,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
      p.y += p.speed;
      p.angle += p.spin;
      if (p.y > canvas.height) {
        p.y = -20;
        p.x = Math.random() * canvas.width;
      }
    });
    confettiAnim = requestAnimationFrame(draw);
  }
  draw();
}

function stopConfetti() {
  if (confettiAnim) {
    cancelAnimationFrame(confettiAnim);
    confettiAnim = null;
    const canvas = document.getElementById('confetti-canvas');
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  }
}

// ── Start! ──
init();
</script>
